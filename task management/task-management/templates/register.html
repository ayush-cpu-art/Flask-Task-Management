<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css12/style.css') }}">

</head>

<body>

<div class="task-box">

    <div class="logo">👤</div>

    <h1>Create Account</h1>

    <p class="subtitle">

        Register to start managing your tasks.

    </p>

    <label>Username</label>

    <input
        type="text"
        id="username"
        placeholder="Enter Username">

    <label>Password</label>

    <input
        type="password"
        id="password"
        placeholder="Enter Password">

    <label>Confirm Password</label>

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password">

    <button
        type="button"
        id="registerBtn">

        Register

    </button>

    <p class="register-text">

        Already have an account?

        <a href="/">Login</a>

    </p>

</div>

<script src="{{ url_for('static', filename='js12/register.js') }}"></script>

</body>

</html>
