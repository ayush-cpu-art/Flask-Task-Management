<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Task Management | Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css12/style.css') }}">

</head>

<body>

<div class="task-box">

    <div class="logo">🚀</div>

    <h1>Welcome Back</h1>

    <p class="subtitle">
        Sign in to continue managing your tasks
    </p>

    <label for="username">Username</label>

    <input
        type="text"
        id="username"
        placeholder="Enter your username">

    <label for="password">Password</label>

    <input
        type="password"
        id="password"
        placeholder="Enter your password">

    <button
        type="button"
        id="loginBtn"
        onclick="login()">

        Login

    </button>

    <p class="register-text">

        Don't have an account?

        <a href="/register">
            Create Account
        </a>

    </p>

</div>

<script src="{{ url_for('static', filename='js12/login.js') }}"></script>

</body>

</html>
